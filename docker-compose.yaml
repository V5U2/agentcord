services:
  agentcord:
    build:
      context: .
    image: ghcr.io/v5u2/agentcord:dev
    read_only: true
    restart: unless-stopped
    extra_hosts:
      - host.docker.internal:host-gateway
    tmpfs:
      - /tmp
    volumes:
      - ./config.yaml:/app/config.yaml:ro
      - ./data/memory:/app/data/memory
      - ./data/codex:/app/secrets/codex:ro

  codex-auth:
    image: node:22-slim
    profiles:
      - auth
    working_dir: /work
    command: sh -lc "npm install -g @openai/codex && codex login --device-auth"
    stdin_open: true
    tty: true
    volumes:
      - ./data/codex:/root/.codex
