services:
  agentcord:
    build:
      context: .
    image: ghcr.io/v5u2/agentcord:dev
    read_only: true
    restart: unless-stopped
    extra_hosts:
      - host.docker.internal:host-gateway
    tmpfs:
      - /tmp
    volumes:
      - ./config.yaml:/app/config.yaml:ro
      - ./data/memory:/app/data/memory
      # For auth_mode: codex_auth_file_api_key in Docker, mount a Codex auth file
      # and set codex_auth_file: /app/secrets/codex-auth.json in config.yaml.
      # - ~/.codex/auth.json:/app/secrets/codex-auth.json:ro
