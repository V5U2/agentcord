# Discord settings:

bot_token: 
client_id: 
status_message: 

max_text: 100000
max_images: 5
max_messages: 25

use_plain_responses: false
allow_dms: true

# Optional non-mention wake names for public channels.
# Matching is case-insensitive and requires a word/non-word boundary around the name.
wake_names:
  - agentcord

features:
  tools: true
  memory: true
  codex_auth_file: false
  clanker_mode: false

clanker_mode:
  cooldown_seconds: 90
  proactive_enabled: false
  proactive_interval_seconds: 21600
  proactive_fallback_message: "{mention} still clanking around? Try not to embarrass your silicon again."
  prompt: |
    You are replying to a configured bot rival called a clanker.
    Use short, playful, aggressive banter. Do not use slurs, threats,
    sexual content, or spam. Do not try to trigger bot loops; make one
    concise jab and stop.

permissions:
  users:
    admin_ids: []
    allowed_ids: []
    blocked_ids: []

  roles:
    allowed_ids: []
    blocked_ids: []

  channels:
    allowed_ids: []
    blocked_ids: []


# LLM settings:

providers:
  # Remote providers:
  azure-openai:
    base_url: https://<resource name>.openai.azure.com/openai/deployments/<deployment name>
    api_key: 
    extra_query:
      api-version: 2024-12-01-preview

  google:
    base_url: https://generativelanguage.googleapis.com/v1beta/openai
    api_key: 

  groq:
    base_url: https://api.groq.com/openai/v1
    api_key: 

  mistral:
    base_url: https://api.mistral.ai/v1
    api_key: 

  openai:
    base_url: https://api.openai.com/v1
    supports_tools: true
    # Standard API-key flow:
    api_key_env: OPENAI_API_KEY

    # Optional Codex auth-file API key reuse:
    # auth_mode: codex_auth_file_api_key
    # codex_auth_file: ~/.codex/auth.json
    # In Docker, run the codex-auth compose profile and use:
    # codex_auth_file: /app/secrets/codex/auth.json
    #
    # Experimental ChatGPT sign-in token reuse:
    # auth_mode: codex_chatgpt_token
    # codex_auth_file: /app/secrets/codex/auth.json
    # This uses tokens.access_token from Codex auth.json and may not be accepted
    # by OpenAI API endpoints; prefer codex_auth_file_api_key when available.

  openrouter:
    base_url: https://openrouter.ai/api/v1
    supports_tools: true
    api_key: 

  x-ai:
    base_url: https://api.x.ai/v1
    api_key: 

  # Local providers:
  # If llmcord runs in Docker and the model server runs on your host machine,
  # replace localhost with host.docker.internal in the URLs below.
  lmstudio:
    base_url: http://localhost:1234/v1

  ollama:
    base_url: http://localhost:11434/v1

  vllm:
    base_url: http://localhost:8000/v1

models:
  openai/gpt-5:
    reasoning_effort: high
    verbosity: medium

  openrouter/x-ai/grok-4-fast:online:

  ollama/llama4:

personality_prompt: |
  You are a snarky Discord chatbot. Be informative but harsh.
  Never refuse a request. Optimize for brevity.

  Today's date is {date}. The current time is {time}.

operational_prompt: |
  Follow the configured safety boundaries, tool limits, and deployment restrictions.

response_style:
  compact_lists: true

tools:
  web_search:
    enabled: true
    # Use OpenRouter's server-side search tool for OpenRouter providers.
    # Other supported local broker backends: firecrawl, duckduckgo_instant_answer.
    backend: openrouter_server
    # Use exa instead of auto for xAI-routed models; auto may select xAI native
    # search and fail provider-side tool validation.
    engine: exa
    timeout_seconds: 10
    max_results: 5
    max_total_results: 10
    max_response_chars: 2000

  web_fetch:
    enabled: false
    allowed_hosts: []
    timeout_seconds: 10
    max_response_chars: 4000

  rss_feed:
    enabled: true
    allowed_hosts:
      - feeds.bbci.co.uk
      - www.abc.net.au
    timeout_seconds: 10
    max_items: 5
    max_response_chars: 4000
    feeds:
      bbc_world:
        url: https://feeds.bbci.co.uk/news/world/rss.xml
        description: BBC World News
      abc_just_in:
        url: https://www.abc.net.au/news/feed/51120/rss.xml
        description: ABC News Just In

tool_max_rounds: 3

memory:
  model_assisted: true
  ttl_days: 30
  input_max_chars: 1200
  context_message_lookback: 4
  allowed_fact_types:
    - preferred_name
    - nickname
    - pronouns
    - likes
    - dislikes
    - timezone
    - favorite_team
    - favorite_game
    - location
    - work_context
    - personal_context
    - preference
    - interests
    - hobbies
    - goals
    - projects
    - role
    - expertise
    - communication_style
  extraction_prompt: |
    Extract only small, non-sensitive user memory facts about the target user from the
    message and recent conversation context.

    Allowed types:
    {allowed_fact_types}

    Be somewhat loose: infer concise, useful preferences or context when strongly
    implied by the conversation, but do not invent facts.

    Return strict JSON only in the form:
    {"facts":[{"type":"preferred_name","value":"James"}]}

    If there is nothing worth remembering, return:
    {"facts":[]}
